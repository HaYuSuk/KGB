<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Cheri Cafe et Patisserie - KGB Keramika & Kamen</title>
  <!-- Link na tvoje fontove (zadržavamo tvoj luksuzni stil) -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #1a1714;       /* Tvoja tamna pozadina */
      --gold: #c9a96e;     /* Tvoja zlatna boja */
      --text: #f5f5f5;
      --text-muted: #a09890;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      padding: 4rem 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Gumb za povratak */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gold);
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.9rem;
      margin-bottom: 3rem;
      transition: opacity 0.3s ease;
    }
    .back-btn:hover {
      opacity: 0.8;
    }

    /* Zaglavlje projekta */
    .project-header {
      margin-bottom: 4rem;
    }
    .project-tag {
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    .project-title {
      font-size: 3rem;
      font-weight: 400;
      line-height: 1.2;
    }

    /* Elegantna galerija slika */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
    }

    .image-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3; /* Sve slike su u savršenom i jednakom omjeru */
      background: #231f1b;
      border: 1px solid rgba(201, 169, 110, 0.1);
      cursor: pointer;
    }

    .image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Automatski reže slike da izgledaju uredno */
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Zoom efekt na hover */
    .image-item:hover img {
      transform: scale(1.05);
    }

    /* Prilagodba za mobitele */
    @media (max-width: 768px) {
      body {
        padding: 2rem 1rem;
      }
      .project-title {
        font-size: 2.2rem;
      }
      .image-grid {
        grid-template-columns: 1fr; /* Na mobitelu idu jedna ispod druge, krupno */
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Gumb za povratak na glavnu stranicu -->
    <a href="index.html" class="back-btn">← Natrag na projekte</a>

    <!-- Naslov projekta -->
    <header class="project-header">
      <div class="project-tag">Komercijalni objekt</div>
      <h1 class="project-title">Mon Cheri Cafe et Patisserie</h1>
    </header>

    <!-- GALERIJA SA SLIKAMA PROJEKTA -->
    <main class="image-grid">
      
      <!-- Slika 1 -->
      <div class="image-item">
        <img src="slike/mon-cheri-1.jpg" alt="Mon Cheri detalj 1">
      </div>

      <!-- Slika 2 -->
      <div class="image-item">
        <img src="slike/mon-cheri-2.jpg" alt="Mon Cheri detalj 2">
      </div>

      <!-- Slika 3 -->
      <div class="image-item">
        <img src="slike/mon-cheri-3.jpg" alt="Mon Cheri detalj 3">
      </div>

      <!-- Slika 4 -->
      <div class="image-item">
        <img src="slike/mon-cheri-4.jpg" alt="Mon Cheri detalj 4">
      </div>

      <!-- Slika 5 -->
      <div class="image-item">
        <img src="slike/mon-cheri-5.jpg" alt="Mon Cheri detalj 5">
      </div>

      <!-- Slika 6 -->
      <div class="image-item">
        <img src="slike/mon-cheri-6.jpg" alt="Mon Cheri detalj 6">
      </div>

    </main>
  </div>

</body>
</html>
